<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Casa 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1116; --slate:#1A1F28; --line:#2C3543; --mist:#8B97A7; --bone:#EAEEF3;
    --ember:#FF5C38; --cyan:#3DD6C4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--ink);color:var(--bone);
    font-family:"Space Grotesk",system-ui,sans-serif;overflow:hidden;}
  #app{position:fixed;inset:0;}
  canvas{display:block;touch-action:none;}

  .brand{position:fixed;top:16px;left:18px;z-index:5;pointer-events:none;}
  .brand h1{margin:0;font-size:19px;font-weight:700;letter-spacing:.22em;}
  .brand h1 .dot{color:var(--ember);}
  .brand p{margin:3px 0 0;font-family:"IBM Plex Mono",monospace;font-size:10px;
    letter-spacing:.16em;color:var(--mist);text-transform:uppercase;}

  .plans{position:fixed;z-index:6;top:62px;left:18px;display:none;max-width:240px;
    font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.04em;color:var(--bone);
    background:rgba(20,25,32,.82);border:1px solid var(--line);border-radius:10px;
    padding:8px 30px 8px 12px;backdrop-filter:blur(14px);cursor:pointer;outline:none;
    appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' stroke='%238B97A7' stroke-width='1.4' fill='none'/></svg>");
    background-repeat:no-repeat;background-position:right 11px center;}
  .plans:hover{border-color:var(--mist);}
  .plans option{background:#1A1F28;color:var(--bone);}

  /* ---- editor ---- */
  .editbar{position:fixed;z-index:7;top:16px;left:50%;transform:translateX(-50%);
    display:none;gap:7px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:94vw;}
  .insp{position:fixed;z-index:7;left:18px;bottom:70px;width:262px;display:none;
    background:rgba(20,25,32,.9);backdrop-filter:blur(14px);border:1px solid var(--line);
    border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.5);overflow:hidden;}
  .insp .ih{padding:11px 14px;border-bottom:1px solid var(--line);font-size:11px;
    letter-spacing:.18em;text-transform:uppercase;color:var(--mist);}
  .insp .ib{padding:12px 14px;max-height:min(56vh,460px);overflow-y:auto;}
  .fld{margin-bottom:10px;}
  .fld label{display:block;font-family:"IBM Plex Mono",monospace;font-size:9.5px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--mist);margin-bottom:4px;}
  .fld input,.fld select{width:100%;background:#11151b;color:var(--bone);
    border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:12.5px;
    font-family:inherit;outline:none;}
  .fld input[type=color]{height:34px;padding:3px;cursor:pointer;}
  .fld .row2{display:flex;gap:8px;}
  .danger{color:#ffb9a6;border-color:rgba(255,92,56,.4);}
  .danger:hover{border-color:var(--ember);}
  .hint{font-family:"IBM Plex Mono",monospace;font-size:9.5px;color:var(--mist);
    line-height:1.5;margin:2px 0 10px;}
  body.editing canvas{cursor:crosshair;}

  /* ---- in-panel device dashboard (sheet) ---- */
  .sheet-bg{position:fixed;inset:0;z-index:30;background:rgba(8,10,14,.55);
    display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
  .sheet{width:min(360px,92vw);background:rgba(22,27,35,.97);border:1px solid var(--line);
    border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.6);overflow:hidden;}
  .sheet .sh{display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;border-bottom:1px solid var(--line);}
  .sheet .sh .t{font-size:15px;font-weight:600;}
  .sheet .sh .x{cursor:pointer;color:var(--mist);font-size:20px;line-height:1;border:none;background:none;}
  .sheet .sb{padding:16px;}
  .big{font-family:"IBM Plex Mono",monospace;font-size:40px;text-align:center;margin:6px 0 2px;}
  .sub2{text-align:center;color:var(--mist);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;}
  .stepper{display:flex;align-items:center;justify-content:center;gap:14px;margin:12px 0;}
  .stepper button{width:46px;height:46px;border-radius:12px;border:1px solid var(--line);
    background:#11151b;color:var(--bone);font-size:22px;cursor:pointer;}
  .stepper button:hover{border-color:var(--mist);}
  .stepper .v{font-family:"IBM Plex Mono",monospace;font-size:26px;min-width:90px;text-align:center;}
  .modes{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
  .modes .m{font-family:"IBM Plex Mono",monospace;font-size:11px;text-transform:capitalize;
    padding:8px 12px;border-radius:9px;border:1px solid var(--line);background:#11151b;
    color:var(--bone);cursor:pointer;}
  .modes .m.on{border-color:var(--cyan);color:var(--cyan);}
  .sheet input[type=range]{width:100%;}
  .attrs{font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--mist);}
  .attrs div{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(44,53,67,.4);}
  .attrs b{color:var(--bone);font-weight:500;}

  .panel{position:fixed;z-index:5;top:60px;right:16px;width:284px;
    background:rgba(20,25,32,.82);backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:14px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.5);}
  .panel-head{display:flex;align-items:center;justify-content:space-between;
    padding:12px 15px 10px;border-bottom:1px solid var(--line);}
  .panel-head .t{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mist);}
  .panel-head .n{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--bone);}
  .rows{max-height:min(54vh,440px);overflow-y:auto;}
  .row{display:flex;align-items:center;gap:11px;padding:11px 15px;cursor:pointer;
    border-bottom:1px solid rgba(44,53,67,.5);transition:background .15s;}
  .row:last-child{border-bottom:none;}
  .row:hover{background:rgba(255,255,255,.03);}
  .row.ro{cursor:default;}
  .swatch{width:9px;height:9px;border-radius:50%;flex:0 0 auto;background:var(--line);transition:.2s;}
  .swatch.on{background:var(--ember);box-shadow:0 0 10px var(--ember);}
  .swatch.cool{background:var(--cyan);box-shadow:0 0 10px var(--cyan);}
  .row .meta{flex:1;min-width:0;}
  .row .name{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .sub{font-size:10px;color:var(--mist);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .val{font-family:"IBM Plex Mono",monospace;font-size:12.5px;color:var(--bone);flex:0 0 auto;text-align:right;}
  .row .val.dim{color:var(--mist);}

  .dock{position:fixed;z-index:5;left:18px;bottom:18px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .btn{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.06em;color:var(--bone);
    background:rgba(20,25,32,.82);border:1px solid var(--line);padding:9px 13px;border-radius:10px;
    cursor:pointer;backdrop-filter:blur(14px);transition:.15s;text-transform:uppercase;}
  .btn:hover{border-color:var(--mist);}
  .btn.active{border-color:var(--cyan);color:var(--cyan);}

  .banner{position:fixed;z-index:6;top:14px;left:50%;transform:translateX(-50%);
    background:rgba(255,92,56,.12);border:1px solid rgba(255,92,56,.4);color:#ffb9a6;
    font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.04em;
    padding:7px 13px;border-radius:9px;display:none;max-width:90vw;text-align:center;}

  #loader{position:fixed;inset:0;z-index:20;background:var(--ink);display:flex;
    align-items:center;justify-content:center;flex-direction:column;gap:14px;
    transition:opacity .6s;font-family:"IBM Plex Mono",monospace;}
  #loader .bar{width:140px;height:2px;background:var(--line);overflow:hidden;border-radius:2px;}
  #loader .bar i{display:block;height:100%;width:30%;background:var(--ember);animation:slide 1s infinite ease-in-out;}
  #loader span{font-size:10px;letter-spacing:.22em;color:var(--mist);text-transform:uppercase;}
  @keyframes slide{0%{transform:translateX(-120%)}100%{transform:translateX(420%)}}

  @media (max-width:760px){
    .panel{top:auto;bottom:0;right:0;left:0;width:100%;border-radius:16px 16px 0 0;border-bottom:none;}
    .rows{max-height:32vh;}
    .dock{bottom:calc(32vh + 70px);}
    .brand h1{font-size:16px;}
  }
  @media (prefers-reduced-motion:reduce){#loader .bar i{animation:none;width:100%;}}
</style>
</head>
<body>
<div id="app"></div>
<div class="brand"><h1>CASA 3D<span class="dot">.</span></h1><p>Gémeo digital · ao vivo</p></div>
<select class="plans" id="plans" title="Planta"></select>
<div class="banner" id="banner"></div>

<div class="panel">
  <div class="panel-head"><span class="t">Dispositivos</span><span class="n" id="clock">--:--</span></div>
  <div class="rows" id="rows"></div>
</div>

<div class="dock">
  <button class="btn" id="btnReset">Recentrar</button>
  <button class="btn" id="btnNight">Noite</button>
  <button class="btn active" id="btnSpin">Rodar</button>
  <button class="btn" id="btnDemo">Demo</button>
  <button class="btn" id="btnEdit">Editar</button>
</div>

<div class="editbar" id="editbar">
  <button class="btn" id="btnAdd">+ Objeto</button>
  <button class="btn" id="btnWalls">Paredes</button>
  <button class="btn" id="btnSave">Guardar</button>
  <button class="btn danger" id="btnExit">Sair</button>
</div>

<div class="insp" id="insp">
  <div class="ih" id="inspTitle">Inspetor</div>
  <div class="ib" id="inspBody"></div>
</div>

<div class="sheet-bg" id="sheetBg">
  <div class="sheet">
    <div class="sh"><span class="t" id="sheetTitle"></span><button class="x" id="sheetClose">×</button></div>
    <div class="sb" id="sheetBody"></div>
  </div>
</div>

<div id="loader"><div class="bar"><i></i></div><span>a projetar a casa</span></div>

<script src="./three.min.js?v=011"></script>
<script src="./OrbitControls.js?v=011"></script>
<script>
/* Guard: if the bundled 3D libs didn't load, say so clearly instead of a silent console error. */
(function(){
  var missing = (typeof THREE==='undefined') ? 'three.min.js'
              : (typeof THREE.OrbitControls!=='function') ? 'OrbitControls.js' : null;
  if(missing){
    var l=document.getElementById('loader');
    if(l){ l.innerHTML='<div style="max-width:300px;text-align:center;font-family:monospace;color:#ffb9a6;font-size:12px;line-height:1.6">'
      +'Ficheiro 3D não carregou:<br><b>'+missing+'</b><br><br>'
      +'Faz <b>Rebuild</b> ao add-on (menu ⋮) e recarrega a página. '
      +'Confirma que <code>'+missing+'</code> está em <code>casa3d/www/</code>.</div>'; }
    throw new Error('Casa 3D: '+missing+' failed to load');
  }
})();
/* ============================================================================
   CASA 3D — Home Assistant add-on frontend.
   Talks to the add-on's bridge server:
     GET  ./api/homes     -> [{file,name}] for every plan in /config (dropdown)
     GET  ./api/home      -> floor-plan schema; ?file= picks one (or {use_builtin:true})
     GET  ./api/states    -> HA states (proxied)
     POST ./api/service    -> {domain, service, entity_id}
   If those calls fail (e.g. opened outside HA) OR no mapped entities exist yet,
   it falls back to DEMO mode with simulated states, so the house is always alive.
   ============================================================================ */

const WALL_H=2.6, WALL_T=0.12, DOOR_TOP=2.05, WIN_SILL=0.95, WIN_TOP=2.05;
const REFRESH_MS=3000;

/* ---- built-in template (used until you ship your own casa3d.json) -------- */
const BUILTIN_HOME = {
  meta:{ name:"Apartamento" },
  rooms:[
    { id:"sala",    name:"Sala",          poly:[[-4,0],[0,0],[0,3],[-4,3]],  tone:0x252d39 },
    { id:"cozinha", name:"Cozinha",       poly:[[0,0],[4,0],[4,3],[0,3]],    tone:0x222a35 },
    { id:"quarto",  name:"Quarto",        poly:[[-4,-3],[0,-3],[0,0],[-4,0]],tone:0x262e3a },
    { id:"banho",   name:"Casa de Banho", poly:[[0,-3],[4,-3],[4,0],[0,0]],  tone:0x202732 },
  ],
  walls:[
    { a:[-4,3],  b:[4,3],  o:[{at:0.25,w:1.4,k:"win"},{at:0.75,w:1.4,k:"win"}] },
    { a:[-4,-3], b:[4,-3], o:[{at:0.25,w:1.4,k:"win"}] },
    { a:[-4,-3], b:[-4,3], o:[{at:0.75,w:1.0,k:"door"}] },
    { a:[4,-3],  b:[4,3],  o:[{at:0.75,w:1.4,k:"win"}] },
    { a:[0,-3],  b:[0,3],  o:[{at:0.25,w:0.9,k:"door"},{at:0.75,w:0.9,k:"door"}] },
    { a:[-4,0],  b:[4,0],  o:[{at:0.25,w:0.9,k:"door"},{at:0.75,w:0.9,k:"door"}] },
  ],
  devices:[
    { id:"l_sala", entity:"light.sala",     type:"light",   name:"Candeeiro Sala", room:"sala",    pos:[-2,1.5] },
    { id:"l_coz",  entity:"light.cozinha",  type:"light",   name:"Luz Cozinha",    room:"cozinha", pos:[2,1.5] },
    { id:"l_qua",  entity:"light.quarto",   type:"light",   name:"Luz Quarto",     room:"quarto",  pos:[-2,-1.5] },
    { id:"clima",  entity:"climate.sala",   type:"climate", name:"Termostato",     room:"sala",    pos:[-3.4,2.6] },
    { id:"estore", entity:"cover.estore_sala", type:"cover",name:"Estore Sala",    room:"sala",    pos:[-2,2.9] },
    { id:"porta",  entity:"binary_sensor.porta", type:"sensor", name:"Porta Entrada", room:"sala", pos:[-3.92,1.5] },
    { id:"mov",    entity:"binary_sensor.mov_cozinha", type:"sensor", name:"Movimento Cozinha", room:"cozinha", pos:[3.4,2.6] },
  ],
};
/* simulated states for demo mode (keyed by the built-in entity ids) */
const DEMO_STATES = {
  "light.sala":{state:"on",attributes:{}}, "light.cozinha":{state:"off",attributes:{}},
  "light.quarto":{state:"off",attributes:{}},
  "climate.sala":{state:"heat",attributes:{current_temperature:21.5}},
  "cover.estore_sala":{state:"open",attributes:{current_position:60}},
  "binary_sensor.porta":{state:"off",attributes:{device_class:"door"}},
  "binary_sensor.mov_cozinha":{state:"off",attributes:{device_class:"motion"}},
};

let HOME = BUILTIN_HOME;
let STATES = {};            // live states from HA
let SIM = JSON.parse(JSON.stringify(DEMO_STATES));
let DEMO = false;

function getState(id){
  if(DEMO) return SIM[id] || {state:"unavailable",attributes:{}};
  return STATES[id] || {state:"unavailable",attributes:{}};
}

/* What happens when you click a device in view mode. Per-object via def.action,
   otherwise a sensible default from its type/domain. */
function actionOf(def){
  if(def.action&&def.action.type) return def.action.type;
  const dom=(def.entity||"").split('.')[0];
  if(["light","cover","switch","fan"].includes(def.type)||["light","cover","switch","fan"].includes(dom)) return "toggle";
  if(def.type==="climate"||dom==="climate") return "panel";
  return "none";
}
function clickable(d){ return actionOf(d.def)!=="none"; }

/* ---------- scene -------------------------------------------------------- */
const app=document.getElementById('app');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0E1116);
scene.fog=new THREE.Fog(0x0E1116,16,34);
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,200);
const CAM_HOME=new THREE.Vector3(8.5,9,11); camera.position.copy(CAM_HOME);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputEncoding=THREE.sRGBEncoding;
app.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08;
controls.minDistance=6; controls.maxDistance=26; controls.maxPolarAngle=Math.PI*0.49;
controls.target.set(0,0.4,0); controls.autoRotate=true; controls.autoRotateSpeed=0.55;

scene.add(new THREE.HemisphereLight(0x3a4658,0x0a0d12,0.9));
const dir=new THREE.DirectionalLight(0xcdd8e6,0.55); dir.position.set(6,12,4); scene.add(dir);
const fill=new THREE.DirectionalLight(0x2a3445,0.3); fill.position.set(-7,5,-6); scene.add(fill);
const hemi=scene.children.find(c=>c.isHemisphereLight);

const grid=new THREE.GridHelper(40,40,0x223040,0x18222e);
grid.position.y=-0.02; grid.material.transparent=true; grid.material.opacity=0.5; scene.add(grid);
const pad=new THREE.Mesh(new THREE.CircleGeometry(7.6,64),
  new THREE.MeshBasicMaterial({color:0x0c1f26,transparent:true,opacity:0.35}));
pad.rotation.x=-Math.PI/2; pad.position.y=-0.015; scene.add(pad);

const houseGroup=new THREE.Group(); scene.add(houseGroup);

/* ---------- materials ---------------------------------------------------- */
const matWall =new THREE.MeshStandardMaterial({color:0x2C353F,roughness:0.95,metalness:0,flatShading:true});
const matTrim =new THREE.MeshStandardMaterial({color:0x39434f,roughness:0.9, metalness:0,flatShading:true});
const matGlass=new THREE.MeshStandardMaterial({color:0x6fd0e0,roughness:0.15,metalness:0,transparent:true,opacity:0.18});
const matCover=new THREE.MeshStandardMaterial({color:0x4a5563,roughness:0.85,flatShading:true});

const haloTex=makeHalo();
const roomMeshes={};
let devices=[];

/* ---------- builders ----------------------------------------------------- */
const SHARED=new Set([matWall,matTrim,matGlass,matCover]);   // never dispose these materials
const SHARED_TEX=new Set([haloTex]);                         // ...nor these textures
function disposeNode(o){
  o.traverse&&o.traverse(n=>{
    if(n.geometry) n.geometry.dispose();
    const mats=Array.isArray(n.material)?n.material:(n.material?[n.material]:[]);
    mats.forEach(m=>{ if(SHARED.has(m))return; if(m.map&&!SHARED_TEX.has(m.map))m.map.dispose(); m.dispose(); });
  });
}
function clearHouse(){
  for(let i=houseGroup.children.length-1;i>=0;i--){
    const o=houseGroup.children[i]; houseGroup.remove(o); disposeNode(o);
  }
  for(const k in roomMeshes) delete roomMeshes[k];
  devices=[];
}
function buildHouse(){
  applyWallAppearance(HOME.meta&&HOME.meta.wall);
  buildRooms(); buildWalls(); buildDevices(); buildRowsUI();
}
function makeByType(def){
  if(def.type==="light")   return makeLight(def);
  if(def.type==="climate") return makeClimate(def);
  if(def.type==="cover")   return makeCover(def);
  return makeSensor(def);
}
function buildRooms(){
  HOME.rooms.forEach((r,idx)=>{
    const shape=new THREE.Shape();
    r.poly.forEach(([x,z],i)=> i?shape.lineTo(x,-z):shape.moveTo(x,-z));
    shape.closePath();
    const geo=new THREE.ShapeGeometry(shape); geo.rotateX(-Math.PI/2);
    const floor=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:r.tone,roughness:1,metalness:0,flatShading:true}));
    applyRoomTexture(floor,r);
    houseGroup.add(floor);
    const line=new THREE.LineSegments(new THREE.EdgesGeometry(geo),
      new THREE.LineBasicMaterial({color:0x3a4654,transparent:true,opacity:0.6}));
    line.position.y=0.002; houseGroup.add(line);
    const tintMat=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0,depthWrite:false});
    const tint=new THREE.Mesh(geo.clone(),tintMat); tint.position.y=0.04; houseGroup.add(tint);
    const c=polyCentroid(r.poly);
    const lbl=makeLabel((r.name||"").toUpperCase(),0x8B97A7,0.32); lbl.position.set(c[0],0.06,c[1]); houseGroup.add(lbl);
    roomMeshes[r.id]={floor,tintMat,def:r};
  });
}

/* ---------- procedural textures (color + pattern, fully offline) --------- */
function shade(hex,amt){const c=new THREE.Color(hex);c.offsetHSL(0,0,amt);return '#'+c.getHexString();}
function hexStr(hex){return '#'+new THREE.Color(hex).getHexString();}
function makePattern(kind,hex){
  if(!kind||kind==="none") return null;
  const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
  x.fillStyle=hexStr(hex);x.fillRect(0,0,128,128);
  if(kind==="brick"){
    x.fillStyle=shade(hex,-0.08);x.fillRect(0,0,128,128);
    const bw=64,bh=24,m=3;x.fillStyle=shade(hex,0.05);
    for(let r=0,y=0;y<128;y+=bh,r++){const off=(r%2)?-bw/2:0;
      for(let xx=off;xx<128;xx+=bw) x.fillRect(xx+m,y+m,bw-2*m,bh-2*m);}
  }else if(kind==="tile"){
    x.strokeStyle=shade(hex,-0.13);x.lineWidth=2;
    for(let i=0;i<=128;i+=32){x.beginPath();x.moveTo(i,0);x.lineTo(i,128);x.moveTo(0,i);x.lineTo(128,i);x.stroke();}
  }else if(kind==="wood"){
    for(let i=0;i<128;i+=16){x.fillStyle=shade(hex,((i/16)%2)?0.035:-0.035);x.fillRect(0,i,128,16);}
    x.strokeStyle=shade(hex,-0.09);x.lineWidth=1;
    for(let i=0;i<8;i++){x.beginPath();x.moveTo(0,i*16+8);x.bezierCurveTo(40,i*16+4,90,i*16+12,128,i*16+8);x.stroke();}
  }else if(kind==="concrete"){
    for(let i=0;i<1500;i++){x.fillStyle=shade(hex,(Math.random()-0.5)*0.11);x.fillRect(Math.random()*128,Math.random()*128,2,2);}
  }
  const t=new THREE.Texture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.needsUpdate=true;return t;
}
function applyRoomTexture(floor,r){
  floor.material.color.setHex(r.tone||0x252d39);
  if(floor.material.map){floor.material.map.dispose();floor.material.map=null;}
  if(r.pattern&&r.pattern!=="none"){
    const t=makePattern(r.pattern,r.tone||0x252d39);
    let minx=1e9,maxx=-1e9,minz=1e9,maxz=-1e9;
    r.poly.forEach(([px,pz])=>{minx=Math.min(minx,px);maxx=Math.max(maxx,px);minz=Math.min(minz,pz);maxz=Math.max(maxz,pz);});
    t.repeat.set(Math.max(1,Math.round(maxx-minx)),Math.max(1,Math.round(maxz-minz)));
    floor.material.map=t;
  }
  floor.material.needsUpdate=true;
}
function applyWallAppearance(w){
  w=w||{};
  matWall.color.setHex(w.color!=null?w.color:0x2C353F);
  if(matWall.map){matWall.map.dispose();matWall.map=null;}
  if(w.pattern&&w.pattern!=="none"){
    const t=makePattern(w.pattern,w.color!=null?w.color:0x2C353F);
    t.repeat.set(3,2); matWall.map=t;
  }

function buildWalls(){
  HOME.walls.forEach(w=>{
    const a=new THREE.Vector2(w.a[0],w.a[1]), b=new THREE.Vector2(w.b[0],w.b[1]), L=a.distanceTo(b);
    const ops=(w.o||[]).map(o=>{const c=o.at*L; const sill=o.k==="win"?WIN_SILL:0; const top=o.k==="win"?WIN_TOP:DOOR_TOP;
      return {s0:c-o.w/2,s1:c+o.w/2,sill,top,kind:o.k};}).sort((p,q)=>p.s0-q.s0);
    let cur=0;
    ops.forEach(op=>{
      if(op.s0>cur) addWall(a,b,cur,op.s0,0,WALL_H);
      if(op.sill>0) addWall(a,b,op.s0,op.s1,0,op.sill);
      if(op.top<WALL_H) addWall(a,b,op.s0,op.s1,op.top,WALL_H,matTrim);
      if(op.kind==="win") addGlass(a,b,op.s0,op.s1,op.sill,op.top);
      cur=op.s1;
    });
    if(cur<L) addWall(a,b,cur,L,0,WALL_H);
  });
}
function addWall(a,b,s0,s1,y0,y1,mat){
  const len=s1-s0; if(len<=0.001) return;
  const d=b.clone().sub(a).normalize(); const mid=s0+len/2;
  const px=a.x+d.x*mid, pz=a.y+d.y*mid;
  const geo=new THREE.BoxGeometry(len,y1-y0,WALL_T);
  const m=new THREE.Mesh(geo,mat||matWall);
  m.position.set(px,(y0+y1)/2,pz); m.rotation.y=-Math.atan2(d.y,d.x); houseGroup.add(m);
  const eg=new THREE.LineSegments(new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({color:0x434f5c,transparent:true,opacity:0.45}));
  eg.position.copy(m.position); eg.rotation.copy(m.rotation); houseGroup.add(eg);
}
function addGlass(a,b,s0,s1,sill,top){
  const len=s1-s0; const d=b.clone().sub(a).normalize(); const mid=s0+len/2;
  const m=new THREE.Mesh(new THREE.PlaneGeometry(len,top-sill),matGlass);
  m.position.set(a.x+d.x*mid,(sill+top)/2,a.y+d.y*mid);
  m.rotation.y=-Math.atan2(d.y,d.x)+Math.PI/2; houseGroup.add(m);
}

/* Each device lives in a Group at (x,0,z); child meshes use local coords, so the
   editor can move/delete a device by just touching its root. */
function makeLight(def){
  const root=new THREE.Group(); root.position.set(def.pos[0],0,def.pos[1]);
  const bulb=new THREE.Mesh(new THREE.IcosahedronGeometry(0.22,0),
    new THREE.MeshStandardMaterial({color:0x2a3340,emissive:0x000000,roughness:0.4,flatShading:true}));
  bulb.position.y=2.25;
  const halo=new THREE.Sprite(new THREE.SpriteMaterial({map:haloTex,color:0xFF5C38,transparent:true,opacity:0,depthWrite:false}));
  halo.scale.set(2.6,2.6,1); halo.position.y=2.25;
  const pl=new THREE.PointLight(0xFF7A4D,0,5,2); pl.position.y=2.25;
  root.add(bulb,halo,pl); houseGroup.add(root);
  return {def,root,hit:[bulb],apply(){
    const on=getState(def.entity).state==="on";
    bulb.material.emissive.setHex(on?0xFF5C38:0x000000); bulb.material.emissiveIntensity=on?1.4:0;
    halo.material.opacity=on?0.55:0;
    const night=scene.background.getHex()<0x0c0f13; pl.intensity=on?(night?2.6:1.5):0;
  }};
}
function makeClimate(def){
  const root=new THREE.Group(); root.position.set(def.pos[0],0,def.pos[1]);
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.32,0.12),matTrim.clone()); body.position.y=1.45;
  const lbl=makeLabel("--",0x3DD6C4,0.26); lbl.position.y=1.78;
  root.add(body,lbl); houseGroup.add(root);
  return {def,root,hit:[body],apply(){
    const st=getState(def.entity); const t=st.attributes&&st.attributes.current_temperature;
    if(t==null){ setLabel(lbl,"--"); return; }
    setLabel(lbl,Number(t).toFixed(1)+"°");
    const k=Math.max(0,Math.min(1,(t-18)/6));
    const col=new THREE.Color(0x3DD6C4).lerp(new THREE.Color(0xFF5C38),k);
    const rm=roomMeshes[def.room]; if(rm){rm.tintMat.color.copy(col); rm.tintMat.opacity=0.14;}
  }};
}
function makeCover(def){
  const root=new THREE.Group(); root.position.set(def.pos[0],0,def.pos[1]);
  const slats=new THREE.Mesh(new THREE.BoxGeometry(1.3,1.1,0.05),matCover.clone()); slats.position.y=WIN_TOP-0.55;
  root.add(slats); houseGroup.add(root);
  return {def,root,hit:[slats],apply(){
    const st=getState(def.entity);
    let pos=(st.attributes&&st.attributes.current_position);
    if(pos==null) pos = st.state==="open"?100 : st.state==="closed"?0 : 50;
    const drop=1-pos/100; const H=1.1;
    slats.scale.y=Math.max(0.04,drop);
    slats.position.y=WIN_TOP-(H*slats.scale.y)/2;
  }};
}
function makeSensor(def){
  const root=new THREE.Group(); root.position.set(def.pos[0],0,def.pos[1]);
  const m=new THREE.Mesh(new THREE.OctahedronGeometry(0.16,0),
    new THREE.MeshStandardMaterial({color:0x39434f,emissive:0x000000,roughness:0.5,flatShading:true})); m.position.y=1.5;

function stateLabel(d){

    case "light": return st.state==="on"?["LIGADO","on"]:["DESLIGADO","dim"];
    case "climate":{const t=st.attributes.current_temperature;return t==null?["—","dim"]:[Number(t).toFixed(1)+"°C","cool"];}
    case "cover":{let p=st.attributes.current_position; if(p==null)p=st.state==="open"?100:0; return [p+"%",p>5?"cool":"dim"];}
    default:{const dc=st.attributes.device_class;
      if(dc==="door")return [st.state==="on"?"ABERTA":"FECHADA",st.state==="on"?"on":"dim"];
      if(dc==="motion")return [st.state==="on"?"MOVIMENTO":"LIVRE",st.state==="on"?"cool":"dim"];

  const fh=ray.intersectObjects(floors,false)[0];

  inspBody.innerHTML=`
    <div class="fld"><label>Nome</label><input id="f_name" value="${esc(def.name)}"></div>
    <div class="fld"><label>Entidade (entity_id)</label><input id="f_ent" value="${esc(def.entity)}"></div>
    <div class="fld"><label>Tipo</label><select id="f_type">${opt(TYPES,def.type)}</select></div>
    <div class="fld"><label>Divisão</label><select id="f_room">${roomOpts||'<option value="">—</option>'}</select></div>
    <div class="fld"><label>Ação ao clicar</label><select id="f_act">${opt(ACTIONS,def.action?def.action.type:'')}</select></div>
    <div id="actparams"></div>
    <div class="hint">Posição ${def.pos[0]}, ${def.pos[1]} m · arrasta no chão para mover.</div>
    <button class="btn danger" id="f_del" style="width:100%">Eliminar objeto</button>`;
  inspBody.querySelector('#f_name').oninput=e=>{def.name=e.target.value;const row=rowsEl.querySelector(`.row[data-id="${def.id}"] .name`);if(row)row.textContent=def.name;dirty=true;};
  inspBody.querySelector('#f_ent').oninput=e=>{def.entity=e.target.value.trim();d.apply();refreshUI();dirty=true;};
  inspBody.querySelector('#f_room').onchange=e=>{def.room=e.target.value;dirty=true;};
  inspBody.querySelector('#f_type').onchange=e=>{def.type=e.target.value;rebuildDevice(d);dirty=true;};
  inspBody.querySelector('#f_act').onchange=e=>{const t=e.target.value;
    if(!t)delete def.action; else def.action=Object.assign({},def.action,{type:t});
    renderActParams(def);buildRowsUI();refreshUI();dirty=true;};
  inspBody.querySelector('#f_del').onclick=deleteSelected;
  renderActParams(def);
}
function renderActParams(def){
  const box=inspBody.querySelector('#actparams'); if(!box) return;
  const a=def.action||{}, t=a.type||'';
  if(t==='service'){
    box.innerHTML=`<div class="fld row2"><div style="flex:1"><label>Domínio</label><input id="p_dom" value="${esc(a.domain)}"></div><div style="flex:1"><label>Serviço</label><input id="p_srv" value="${esc(a.service)}"></div></div>
      <div class="fld"><label>Dados (JSON, opcional)</label><input id="p_data" value="${esc(a.data?JSON.stringify(a.data):'')}"></div>`;
    box.querySelector('#p_dom').oninput=e=>{def.action.domain=e.target.value.trim();dirty=true;};
    box.querySelector('#p_srv').oninput=e=>{def.action.service=e.target.value.trim();dirty=true;};
    box.querySelector('#p_data').oninput=e=>{try{def.action.data=e.target.value?JSON.parse(e.target.value):undefined;e.target.style.borderColor='';}catch(_){e.target.style.borderColor='var(--ember)';}dirty=true;};
  }else if(t==='dashboard'){
    box.innerHTML=`<div class="fld"><label>Caminho do dashboard</label><input id="p_path" value="${esc(a.path)}" placeholder="/lovelace/clima"></div>`;
    box.querySelector('#p_path').oninput=e=>{def.action.path=e.target.value.trim();dirty=true;};
  }else box.innerHTML='';
}
function renderRoomInspector(r){
  inspTitle.textContent='Divisão';
  inspBody.innerHTML=`
    <div class="fld"><label>Nome</label><input id="r_name" value="${esc(r.name)}"></div>
    <div class="fld"><label>Cor do chão</label><input type="color" id="r_col" value="${hexStr(r.tone||0x252d39)}"></div>
    <div class="fld"><label>Textura do chão</label><select id="r_pat">${opt(PATTERNS,r.pattern||'none')}</select></div>`;
  const rm=roomMeshes[r.id];
  inspBody.querySelector('#r_name').oninput=e=>{r.name=e.target.value;dirty=true;};
  inspBody.querySelector('#r_col').oninput=e=>{r.tone=parseInt(e.target.value.slice(1),16);applyRoomTexture(rm.floor,r);dirty=true;};
  inspBody.querySelector('#r_pat').onchange=e=>{r.pattern=e.target.value;applyRoomTexture(rm.floor,r);dirty=true;};
}
function renderWallInspector(){
  inspTitle.textContent='Paredes';
  const w=(HOME.meta&&HOME.meta.wall)||{};
  inspBody.innerHTML=`
    <div class="fld"><label>Cor das paredes</label><input type="color" id="w_col" value="${hexStr(w.color!=null?w.color:0x2C353F)}"></div>
    <div class="fld"><label>Textura das paredes</label><select id="w_pat">${opt(PATTERNS,w.pattern||'none')}</select></div>
    <div class="hint">Aplica-se a todas as paredes desta planta.</div>`;
  const ensure=()=>{HOME.meta=HOME.meta||{};HOME.meta.wall=HOME.meta.wall||{};return HOME.meta.wall;};
  inspBody.querySelector('#w_col').oninput=e=>{ensure().color=parseInt(e.target.value.slice(1),16);applyWallAppearance(HOME.meta.wall);dirty=true;};
  inspBody.querySelector('#w_pat').onchange=e=>{ensure().pattern=e.target.value;applyWallAppearance(HOME.meta.wall);dirty=true;};
}

/* ---- structural ops ---- */
function rebuildDevice(d){
  houseGroup.remove(d.root); disposeNode(d.root);
  const nd=makeByType(d.def); const i=devices.indexOf(d); if(i>=0)devices[i]=nd; nd.apply();
  buildRowsUI(); refreshUI(); setSel({kind:'device',d:nd,obj:nd.root}); return nd;
}
function addObject(){
  HOME.devices=HOME.devices||[];
  const t=controls.target;
  const def={id:'obj_'+Date.now().toString(36),name:'Novo objeto',entity:'light.novo',type:'light',
    room:(HOME.rooms[0]&&HOME.rooms[0].id)||'',pos:[+t.x.toFixed(2),+t.z.toFixed(2)]};
  HOME.devices.push(def);
  const nd=makeByType(def); devices.push(nd); nd.apply();
  buildRowsUI(); refreshUI(); setSel({kind:'device',d:nd,obj:nd.root}); dirty=true;
}
function deleteSelected(){
  if(!selected||selected.kind!=='device') return;
  const d=selected.d;
  houseGroup.remove(d.root); disposeNode(d.root);
  devices=devices.filter(x=>x!==d);
  HOME.devices=(HOME.devices||[]).filter(x=>x!==d.def);
  buildRowsUI(); setSel(null); dirty=true;
}
async function savePlan(){
  const file=(plansEl.style.display!=='none'&&plansEl.value)?plansEl.value:'casa3d.json';
  try{
    const r=await fetch('./api/home?file='+encodeURIComponent(file),
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(HOME)});
    if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error(j.error||('HTTP '+r.status));}
    dirty=false; toast('Guardado: '+file);
    await loadPlans(); populatePlans(file);
  }catch(e){ toast('Erro ao guardar: '+e.message); }
}

document.getElementById('btnEdit').onclick=()=>setEdit(!editMode);
document.getElementById('btnExit').onclick=()=>{ if(dirty&&!confirm('Sair sem guardar? Alterações por guardar perdem-se.'))return; setEdit(false); };
document.getElementById('btnAdd').onclick=addObject;
document.getElementById('btnWalls').onclick=()=>setSel({kind:'wall'});
document.getElementById('btnSave').onclick=savePlan;

/* ======================= IN-PANEL DEVICE DASHBOARD (sheet) =============== */
const sheetBg=document.getElementById('sheetBg'), sheetTitle=document.getElementById('sheetTitle'), sheetBody=document.getElementById('sheetBody');
let sheetEntity=null, sheetType=null;
document.getElementById('sheetClose').onclick=closeSheet;
sheetBg.addEventListener('click',e=>{ if(e.target===sheetBg) closeSheet(); });
function closeSheet(){ sheetBg.style.display='none'; sheetEntity=null; }
function openSheet(entity,type){
  sheetEntity=entity; sheetType=type||entity.split('.')[0];
  sheetTitle.textContent=(devices.find(x=>x.def.entity===entity)||{def:{}}).def.name||entity;
  renderSheet(entity,sheetType); sheetBg.style.display='flex';
}
function reRenderSheet(entity,type){
  if(DEMO){ applyAll(); renderSheet(entity,type); return; }
  setTimeout(async()=>{ await refreshStates(false); if(sheetEntity===entity) renderSheet(entity,type); },500);
}
function renderSheet(entity,type){
  if(sheetEntity!==entity) return;
  const st=getState(entity), at=st.attributes||{};
  if(type==='climate'){
    const cur=at.current_temperature, tgt=at.temperature!=null?at.temperature:cur;
    const modes=(at.hvac_modes&&at.hvac_modes.length)?at.hvac_modes:['off','heat','cool','auto'];
    sheetBody.innerHTML=`
      <div class="big">${cur!=null?Number(cur).toFixed(1)+'°':'--'}</div>
      <div class="sub2">atual · ${esc(st.state)}</div>
      <div class="stepper"><button id="t_dn">−</button><span class="v">${tgt!=null?Number(tgt).toFixed(1)+'°':'--'}</span><button id="t_up">+</button></div>
      <div class="sub2">alvo</div>
      <div class="modes">${modes.map(m=>`<button class="m${m===st.state?' on':''}" data-m="${esc(m)}">${esc(m)}</button>`).join('')}</div>`;
    const step=delta=>{ const base=at.temperature!=null?at.temperature:(cur!=null?cur:21); const v=+(base+delta).toFixed(1);
      if(DEMO){const s=SIM[entity];if(s)s.attributes.temperature=v;} else callService('climate','set_temperature',entity,{temperature:v});
      reRenderSheet(entity,type); };
    sheetBody.querySelector('#t_dn').onclick=()=>step(-0.5);
    sheetBody.querySelector('#t_up').onclick=()=>step(0.5);
    sheetBody.querySelectorAll('.m').forEach(b=>b.onclick=()=>{const m=b.dataset.m;
      if(DEMO){const s=SIM[entity];if(s)s.state=m;} else callService('climate','set_hvac_mode',entity,{hvac_mode:m});
      reRenderSheet(entity,type);});
  }else if(type==='light'){
    const on=st.state==='on', br=at.brightness!=null?Math.round(at.brightness/2.55):(on?100:0);
    sheetBody.innerHTML=`
      <div class="big">${on?'ON':'OFF'}</div><div class="sub2">${esc(entity)}</div>
      <div class="fld"><label>Brilho ${br}%</label><input type="range" id="l_br" min="0" max="100" value="${br}"></div>
      <div class="modes"><button class="m${on?' on':''}" id="l_tog">${on?'Desligar':'Ligar'}</button></div>`;
    sheetBody.querySelector('#l_tog').onclick=()=>{ if(DEMO){const s=SIM[entity];if(s)s.state=on?'off':'on';} else callService('light','toggle',entity); reRenderSheet(entity,type);};
    sheetBody.querySelector('#l_br').onchange=e=>{const v=+e.target.value;
      if(DEMO){const s=SIM[entity];if(s){s.state=v>0?'on':'off';s.attributes.brightness=Math.round(v*2.55);}} else callService('light','turn_on',entity,{brightness_pct:v});
      reRenderSheet(entity,type);};
  }else if(type==='cover'){
    let p=at.current_position; if(p==null)p=st.state==='open'?100:0;
    sheetBody.innerHTML=`
      <div class="big">${p}%</div><div class="sub2">posição</div>
      <div class="fld"><input type="range" id="c_p" min="0" max="100" value="${p}"></div>
      <div class="modes"><button class="m" id="c_open">Abrir</button><button class="m" id="c_stop">Parar</button><button class="m" id="c_close">Fechar</button></div>`;
    const cs=(srv,data)=>{
      if(DEMO){const s=SIM[entity];if(s){if(srv==='open_cover'){s.state='open';s.attributes.current_position=100;}
        else if(srv==='close_cover'){s.state='closed';s.attributes.current_position=0;}
        else if(data){s.attributes.current_position=data.position;s.state=data.position>0?'open':'closed';}}}
      else callService('cover',srv,entity,data);
      reRenderSheet(entity,type); };
    sheetBody.querySelector('#c_open').onclick=()=>cs('open_cover');
    sheetBody.querySelector('#c_close').onclick=()=>cs('close_cover');
    sheetBody.querySelector('#c_stop').onclick=()=>cs('stop_cover');
    sheetBody.querySelector('#c_p').onchange=e=>cs('set_cover_position',{position:+e.target.value});
  }else{
    const rows=Object.keys(at).slice(0,10).map(k=>`<div><span>${esc(k)}</span><b>${esc(at[k])}</b></div>`).join('');
    sheetBody.innerHTML=`<div class="big" style="font-size:26px">${esc(st.state)}</div><div class="sub2">${esc(entity)}</div><div class="attrs">${rows||'<div>sem atributos</div>'}</div>`;
  }
}

/* ---------- clock -------------------------------------------------------- */
const clockEl=document.getElementById('clock');
function tickClock(){const d=new Date();clockEl.textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
tickClock(); setInterval(tickClock,10000);

/* ---------- boot --------------------------------------------------------- */
houseGroup.position.y=-2.2; houseGroup.scale.set(1,0.001,1); let intro=0;
const easeOut=t=>1-Math.pow(1-t,3);
function loop(){requestAnimationFrame(loop);
  if(intro<1){intro=Math.min(1,intro+0.012);const e=easeOut(intro);houseGroup.position.y=-2.2*(1-e);houseGroup.scale.y=0.001+e*0.999;}
  if(camAnim){camAnim.t=Math.min(1,camAnim.t+0.04);const e=easeOut(camAnim.t);camera.position.lerpVectors(camAnim.from,camAnim.to,e);if(camAnim.t>=1)camAnim=null;}
  pulses=pulses.filter(p=>{p.t+=0.03;const s=1+p.t*5;p.ring.scale.set(s,s,s);p.ring.material.opacity=0.8*(1-p.t);
    if(p.t>=1){scene.remove(p.ring);p.ring.geometry.dispose();p.ring.material.dispose();return false;}return true;});
  controls.update(); renderer.render(scene,camera);
}
loop();

(async function start(){
  await loadPlans();
  if(PLANS.length){
    populatePlans(PLANS[0].file);
    try{ const h=await api('./api/home?file='+encodeURIComponent(PLANS[0].file));
         if(h&&Array.isArray(h.rooms)) HOME=h; }catch(e){}
  }else{
    await loadHome();            // legacy casa3d.json, or builtin/demo
    populatePlans();             // nothing to list -> stays hidden
  }
  buildHouse();
  await refreshStates(true);
  setInterval(()=>{ if(!DEMO) refreshStates(false); }, REFRESH_MS);
})();

addEventListener('load',()=>{const l=document.getElementById('loader');setTimeout(()=>{l.style.opacity=0;setTimeout(()=>l.remove(),650);},500);});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
